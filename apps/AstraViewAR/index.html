<!DOCTYPE html>
<html lang="en-us">

<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport"
    content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
  <title>Unity WebGL Player | IntruScan</title>
  <style>
    /* Eliminamos márgenes y evitamos las barras de desplazamiento (scroll) */
    html,
    body {
      padding: 0;
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000000;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Forzamos al canvas a ocupar absolutamente todo el espacio de la pantalla */
    #unity-canvas {
      width: 100% !important;
      height: 100% !important;
      position: absolute;
      top: 0;
      left: 0;
    }
  </style>
</head>

<body>
  <canvas id="unity-canvas" tabindex="-1"></canvas>

  <script src="Build/Exportacion_WebGL.loader.js"></script>
  <script>
    // La instancia de Unity se crea directamente, el CSS ya maneja el tamaño en todas las pantallas
    createUnityInstance(document.querySelector("#unity-canvas"), {
      dataUrl: "Build/Exportacion_WebGL.data.unityweb",
      frameworkUrl: "Build/Exportacion_WebGL.framework.js.unityweb",
      codeUrl: "Build/Exportacion_WebGL.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "Unisimon",
      productName: "IntruScan",
      productVersion: "0.1",
      // matchWebGLToCanvasSize: false, // Uncomment this to separately control WebGL canvas render size and DOM element size.
      // devicePixelRatio: 1, // Uncomment this to override low DPI rendering on high DPI displays.
    });
  </script>
</body>

</html>
