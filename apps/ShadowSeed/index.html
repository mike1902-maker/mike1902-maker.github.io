<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <title>Unity WebGL Player | Shadow Seed</title>
    <style>
      /* Eliminamos márgenes, evitamos scroll y aplicamos fondo negro puro */
      html, body {
        padding: 0;
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden; 
        background-color: #000000; 
        display: flex;
        justify-content: center;
        align-items: center;
      }
      /* Forzamos al canvas a ocupar el espacio completo de la ventana manteniendo la proporción */
      #unity-canvas {
        width: 100% !important;
        height: 100% !important;
        object-fit: contain;
        object-position: center;
      }
    </style>
  </head>
  <body>
    <!-- Añadimos una resolución base alta (1920x1080) para que no se vea borroso -->
    <canvas id="unity-canvas" width="1920" height="1080" tabindex="-1"></canvas>
    
    <script src="Build/Exportacion WebGL.loader.js"></script>
    <script>
      createUnityInstance(document.querySelector("#unity-canvas"), {
        dataUrl: "Build/Exportacion WebGL.data.unityweb",
        frameworkUrl: "Build/Exportacion WebGL.framework.js.unityweb",
        codeUrl: "Build/Exportacion WebGL.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Shadow Seed",
        productVersion: "1.0",
        matchWebGLToCanvasSize: false, 
        // devicePixelRatio: 1, 
      });
    </script>
  </body>
</html>
